# docker-compose.yml — Local development environment
# Starts PostgreSQL and Redis containers for the St. Lawrence Next Gen Academy backend
#
# Usage: docker-compose up -d
#
# Services:
#   postgres — Primary relational database (users, questions, classrooms, payments)
#   redis    — Session cache, socket presence tracking, rate limiting
#
# Environment variables are read from server/.env
# Default ports: Postgres=5432, Redis=6379
version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stlawrence_db
      POSTGRES_USER: stlawrence_user
      POSTGRES_PASSWORD: changeme_in_env
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
